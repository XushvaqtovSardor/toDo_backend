version: '3.9'

services:
  db:
    image: postgres:16
    container_name: todo_data
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: todo_db
    ports:
      - '5436:5432'
    volumes:
      - baza_data:/var/lib/postgresql/data
  # redis:
  #   image: redis:7
  #   container_name: payment_redis
  #   restart: always
  #   ports:
  #     - '6381:6379'
  app:
    build: .
    container_name: todobackend
    restart: always
    env_file:
      - .env
    ports:
      - '3005:3000'
    depends_on:
      - db
      # - redis
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        pnpm run start:dev
      "
    environment:
      DATABASE_URL: postgres://postgres:12345@db:5432/todo_db
      # REDIS_HOST: redis
      # REDIS_PORT: 6379


